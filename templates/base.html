<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Software Review MVP{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Figtree', 'system-ui', 'sans-serif'],
            display: ['Outfit', 'system-ui', 'sans-serif'],
          },
          colors: {
            accent: { 500: '#0d9488', 600: '#0f766e', 700: '#115e59' },
            surface: '#fafaf9',
            ink: '#1c1917',
            muted: '#78716c',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Figtree', system-ui, sans-serif; }
    .font-display { font-family: 'Outfit', system-ui, sans-serif; }
    .star-filled { color: #f59e0b; }
    .star-empty { color: #d6d3d1; }
  </style>
</head>
<body class="min-h-screen bg-stone-50 text-stone-900 antialiased">
  <header class="border-b border-stone-200/80 bg-white/80 backdrop-blur-sm sticky top-0 z-10">
    <div class="mx-auto max-w-4xl px-4 py-4 flex items-center justify-between">
      <a href="/" class="font-display font-semibold text-xl text-stone-800 tracking-tight hover:text-teal-600 transition-colors">Software Reviews</a>
      <nav class="flex items-center gap-3">
        <a href="/" class="text-sm text-stone-600 hover:text-stone-900 transition-colors">Home</a>
        <a href="/software/new" class="text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 px-4 py-2 rounded-lg transition-colors shadow-sm">Add Software</a>
      </nav>
    </div>
  </header>
  <main class="min-h-screen pb-16">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-stone-200/80 bg-white/60 py-6 mt-auto">
    <div class="mx-auto max-w-4xl px-4 text-center text-sm text-stone-500">Software Review MVP</div>
  </footer>
</body>
</html>
