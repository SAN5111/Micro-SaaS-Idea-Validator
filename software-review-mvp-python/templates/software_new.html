{% extends "base.html" %}
{% block title %}Add Software{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl px-4 py-10">
  <a href="/" class="inline-flex items-center gap-1.5 text-sm text-stone-600 hover:text-teal-600 transition-colors mb-8">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to list
  </a>
  <h1 class="font-display text-3xl font-bold text-stone-900 tracking-tight">Add Software</h1>
  <p class="mt-1 text-stone-600">Add a new product to the catalog.</p>

  <form method="post" action="/software/new" class="mt-8 rounded-2xl border border-stone-200 bg-white p-8 shadow-sm space-y-6">
    <div>
      <label for="name" class="block text-sm font-medium text-stone-700">Name <span class="text-stone-400">(required)</span></label>
      <input type="text" id="name" name="name" required
        class="mt-2 block w-full rounded-xl border border-stone-300 px-4 py-3 text-stone-900 placeholder-stone-400 focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-shadow"
        placeholder="e.g. Notion, Figma">
    </div>
    <div>
      <label for="description" class="block text-sm font-medium text-stone-700">Description <span class="text-stone-400">(required)</span></label>
      <textarea id="description" name="description" required rows="4"
        class="mt-2 block w-full rounded-xl border border-stone-300 px-4 py-3 text-stone-900 placeholder-stone-400 focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-shadow resize-none"
        placeholder="A short description of the product"></textarea>
    </div>
    <div>
      <label for="website" class="block text-sm font-medium text-stone-700">Website URL <span class="text-stone-400">(optional)</span></label>
      <input type="url" id="website" name="website"
        class="mt-2 block w-full rounded-xl border border-stone-300 px-4 py-3 text-stone-900 placeholder-stone-400 focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-shadow"
        placeholder="https://...">
    </div>
    <button type="submit" class="font-medium text-white bg-teal-600 hover:bg-teal-700 px-5 py-3 rounded-xl transition-colors shadow-sm">
      Save &amp; add to list
    </button>
  </form>
</div>
{% endblock %}
